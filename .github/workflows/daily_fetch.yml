name: Daily Market Data Fetch

on:
  # Run every weekday at 22:00 UTC (23:00 CET / 00:00 CEST)
  # US market closes at 16:00 ET = 21:00 UTC (winter) / 20:00 UTC (summer)
  # 1-2 hour buffer ensures data is available year-round (incl. DST)
  schedule:
    - cron: '0 22 * * 1-5'

  # Allow manual trigger from GitHub Actions UI
  workflow_dispatch:

jobs:
  fetch-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch daily market data
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: python scripts/fetch_data.py

      - name: Update OBV daily metrics
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: python scripts/update_obv.py
